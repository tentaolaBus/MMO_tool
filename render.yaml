# render.yaml — Render Blueprint for MMO Video Clipper
# Frontend is deployed on Vercel separately.
# Docs: https://render.com/docs/blueprint-spec

services:
  # ─── Backend API (Docker) ──────────────────────────────────
  - type: web
    name: mmo-clipper-backend
    runtime: docker
    region: singapore
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: SUPABASE_URL
        sync: false           # set in Render dashboard
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        sync: false           # your Vercel URL, e.g. https://mmo-clipper.vercel.app
      - key: AI_SERVICE_URL
        fromService:
          name: mmo-clipper-ai
          type: web
          envVarKey: RENDER_EXTERNAL_URL

  # ─── AI Service (Docker — Whisper + FFmpeg) ────────────────
  - type: web
    name: mmo-clipper-ai
    runtime: docker
    region: singapore
    plan: free
    rootDir: ai-service
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "5000"
      - key: WHISPER_MODEL
        value: base
      - key: STORAGE_DIR
        value: ./storage
